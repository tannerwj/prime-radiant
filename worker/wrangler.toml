name = "prime-radiant"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# --- Fill these in after running setup commands ---

[[d1_databases]]
binding = "PRIME_RADIANT_DB"
database_name = "prime-radiant-db"
database_id = "031dbacf-c383-400c-96f4-0537a41351cd"

[[r2_buckets]]
binding = "PRIME_RADIANT_VAULT"
bucket_name = "prime-radiant-vault"

[[vectorize]]
binding = "PRIME_RADIANT_EMBEDDINGS"
index_name = "prime-radiant-embeddings"

[ai]
binding = "AI"

# Set via: wrangler secret put API_TOKEN
# [vars]
# API_TOKEN is a secret, not a var
